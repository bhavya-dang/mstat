version: 2

before:
  hooks:
    - go mod tidy

builds:
  - binary: mstat
    dir: ./cmd/mstat
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: ["tar.gz"]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: ["zip"]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"

brews:
  - repository:
      owner: bhavya-dang
      name: homebrew-mstat
      token: "{{ .Env.GH_PAT }}"
    directory: Formula
    homepage: "https://github.com/bhavya-dang/mstat"
    description: "Modern stat replacement with bordered table output"
    license: "MIT"
    dependencies:
      - name: git
        os: mac
